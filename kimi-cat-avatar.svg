<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="earGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="faceGradient" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#9333EA"/>
    </linearGradient>
    <linearGradient id="snoutGradient" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#F3E8FF"/>
      <stop offset="100%" stop-color="#E9D5FF"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F3E8FF"/>
      <stop offset="70%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#7C3AED" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Ears -->
  <path d="M280 320 L220 140 L400 220 Z" fill="url(#earGradient)" filter="url(#softShadow)"/>
  <path d="M744 320 L804 140 L624 220 Z" fill="url(#earGradient)" filter="url(#softShadow)"/>
  
  <!-- Inner ears -->
  <path d="M295 300 L250 180 L360 235 Z" fill="#F3E8FF" opacity="0.6"/>
  <path d="M729 300 L774 180 L664 235 Z" fill="#F3E8FF" opacity="0.6"/>

  <!-- Head -->
  <ellipse cx="512" cy="480" rx="280" ry="240" fill="url(#faceGradient)" filter="url(#softShadow)"/>

  <!-- Snout/Muzzle area -->
  <ellipse cx="512" cy="560" rx="140" ry="100" fill="url(#snoutGradient)"/>

  <!-- Eyes -->
  <ellipse cx="400" cy="460" rx="45" ry="55" fill="url(#eyeGlow)"/>
  <ellipse cx="624" cy="460" rx="45" ry="55" fill="url(#eyeGlow)"/>
  
  <!-- Pupils -->
  <ellipse cx="400" cy="465" rx="18" ry="28" fill="#4C1D95"/>
  <ellipse cx="624" cy="465" rx="18" ry="28" fill="#4C1D95"/>
  
  <!-- Eye highlights -->
  <circle cx="390" cy="450" r="12" fill="white" opacity="0.9"/>
  <circle cx="614" cy="450" r="12" fill="white" opacity="0.9"/>
  <circle cx="408" cy="475" r="6" fill="white" opacity="0.5"/>
  <circle cx="632" cy="475" r="6" fill="white" opacity="0.5"/>

  <!-- Nose -->
  <path d="M492 545 L532 545 L512 575 Z" fill="#C026D3" rx="8"/>

  <!-- Mouth -->
  <path d="M512 575 Q480 600 450 580" fill="none" stroke="#7C3AED" stroke-width="4" stroke-linecap="round"/>
  <path d="M512 575 Q544 600 574 580" fill="none" stroke="#7C3AED" stroke-width="4" stroke-linecap="round"/>

  <!-- Whiskers left -->
  <line x1="380" y1="540" x2="280" y2="520" stroke="#E9D5FF" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <line x1="380" y1="560" x2="270" y2="560" stroke="#E9D5FF" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <line x1="380" y1="580" x2="280" y2="600" stroke="#E9D5FF" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- Whiskers right -->
  <line x1="644" y1="540" x2="744" y2="520" stroke="#E9D5FF" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <line x1="644" y1="560" x2="754" y2="560" stroke="#E9D5FF" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <line x1="644" y1="580" x2="744" y2="600" stroke="#E9D5FF" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- Cheeks blush -->
  <ellipse cx="320" cy="520" rx="35" ry="25" fill="#F0ABFC" opacity="0.4"/>
  <ellipse cx="704" cy="520" rx="35" ry="25" fill="#F0ABFC" opacity="0.4"/>

  <!-- Moon accent (Moonshot theme) -->
  <circle cx="512" cy="220" r="50" fill="none" stroke="#F3E8FF" stroke-width="6" opacity="0.6"/>
  <path d="M512 185 A35 35 0 1 1 512 255 A25 25 0 1 0 512 185" fill="#F3E8FF" opacity="0.4"/>
</svg>